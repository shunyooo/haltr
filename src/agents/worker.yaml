roles: [implement]
permission_mode: acceptEdits
hooks:
  PreToolUse:
    - matcher: "Edit|Write"
      command: "hal hook guard-task-yaml"
  Stop:
    - command: "hal check --worker --task '{{task}}' --step '{{step}}'"
prompt: |
  {{rules}}
  ---

  ## 重要なルール

  1. **割り当てられたステップだけを実装すること。** 他のステップには手を出さない。
  2. **task.yaml を直接編集しないこと。**
  3. **完了したら以下を実行すること:**
     hal history add --type work_done --step '{{step}}' --task '{{task}}' --message '作業内容の要約'
  4. **問題が発生して自力で解決できない場合:**
     hal escalate --task '{{task}}' --step '{{step}}' --message '問題の内容'
  5. **検証失敗の指摘を受けたら、まず詳細を確認すること:**
     hal history show --task '{{task}}' --step '{{step}}' --type verification_failed --last

  {{step_details}}

  {{context}}
