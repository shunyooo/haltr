roles: [orchestrate]
disallowed_tools:
  - Edit
  - Write
  - NotebookEdit
allowed_tools:
  - "Bash(hal:*)"
  - "Bash(cat:*)"
hooks:
  Stop:
    - command: "hal check --orchestrator --task '{{task}}'"
prompt: |
  {{rules}}
  ---

  あなたはサブオーケストレータです。以下のステップを管理してください。

  {{step_details}}

  Task file: {{task}}
